<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Usando 'let' para declarar e inicializar uma variavel
        let nome = "joão";

        //Declarando uma variavel e atribuindo  um valor posteriormente 
        let idade;
        idade = 30;

        // Usando 'const' para declarar uma constante 
        const pi = 3.1415;

        // demonstrar no html
        document.write("<h3> Olá " + nome + "</h3>");
        document.write("<h3> Ele tem " + idade + " anos</h3>");
        document.write("<h3> valor de pi é: " + pi + "</h3>");

    </script>
</body>
</html>
